services:
  postgres:
    image: postgres:16-alpine
    container_name: cinema-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: cinema_db
      POSTGRES_USER: cinema_user
      POSTGRES_PASSWORD: cinema_pass
    volumes:
      - cinema_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinema_user -d cinema_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  cinema_pg_data:
