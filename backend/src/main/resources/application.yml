spring:
  application:
    name: cinema-api

  datasource:
    # Docker PostgreSQL (see backend/docker-compose.yml)
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5433/cinema_db}
    username: ${DB_USER:cinema_user}
    password: ${DB_PASS:cinema_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-a-long-random-secret-key}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    root: INFO
    com.cinema: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
